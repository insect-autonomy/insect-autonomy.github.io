<!--?xml version="1.0" encoding="UTF-8"?-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="#0b1220"></rect>

  <!-- Soft glow -->
  <circle cx="128" cy="128" r="92" fill="#7dd3fc" opacity="0.10"></circle>
  <circle cx="128" cy="128" r="70" fill="#a7f3d0" opacity="0.10"></circle>

  <!-- Antennae -->
  <path d="M110 66 C92 52, 80 44, 66 44" fill="none" stroke="#7dd3fc" stroke-width="10" stroke-linecap="round"></path>
  <path d="M146 66 C164 52, 176 44, 190 44" fill="none" stroke="#7dd3fc" stroke-width="10" stroke-linecap="round"></path>
  <circle cx="62" cy="44" r="8" fill="#7dd3fc"></circle>
  <circle cx="194" cy="44" r="8" fill="#7dd3fc"></circle>

  <!-- Legs -->
  <path d="M88 122 L52 108" fill="none" stroke="#eaf0f7" stroke-width="10" stroke-linecap="round" opacity="0.9"></path>
  <path d="M84 148 L46 148" fill="none" stroke="#eaf0f7" stroke-width="10" stroke-linecap="round" opacity="0.9"></path>
  <path d="M92 174 L56 190" fill="none" stroke="#eaf0f7" stroke-width="10" stroke-linecap="round" opacity="0.9"></path>

  <path d="M168 122 L204 108" fill="none" stroke="#eaf0f7" stroke-width="10" stroke-linecap="round" opacity="0.9"></path>
  <path d="M172 148 L210 148" fill="none" stroke="#eaf0f7" stroke-width="10" stroke-linecap="round" opacity="0.9"></path>
  <path d="M164 174 L200 190" fill="none" stroke="#eaf0f7" stroke-width="10" stroke-linecap="round" opacity="0.9"></path>

  <!-- Body: head / thorax / abdomen -->
  <rect x="102" y="76" width="52" height="44" rx="18" fill="#a7f3d0"></rect>
  <rect x="86" y="118" width="84" height="60" rx="28" fill="#7dd3fc"></rect>
  <rect x="96" y="172" width="64" height="62" rx="28" fill="#a7f3d0"></rect>

  <!-- Head details -->
  <circle cx="118" cy="98" r="6" fill="#0b1220"></circle>
  <circle cx="138" cy="98" r="6" fill="#0b1220"></circle>
  <rect x="122" y="108" width="12" height="6" rx="3" fill="#0b1220" opacity="0.9"></rect>

  <!-- Abdomen stripes (bee-like) -->
  <path d="M104 194 H152" stroke="#0b1220" stroke-width="10" stroke-linecap="round" opacity="0.30"></path>
  <path d="M108 212 H148" stroke="#0b1220" stroke-width="10" stroke-linecap="round" opacity="0.30"></path>
  <path d="M112 230 H144" stroke="#0b1220" stroke-width="10" stroke-linecap="round" opacity="0.30"></path>

  <!-- AI chip on thorax -->
  <rect x="108" y="132" width="40" height="32" rx="8" fill="#0b1220" opacity="0.92"></rect>
  <rect x="112" y="136" width="32" height="24" rx="6" fill="#111b2f"></rect>

  <!-- Chip pins -->
  <g stroke="#a7f3d0" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <path d="M108 138 H100"></path><path d="M108 146 H98"></path><path d="M108 154 H100"></path><path d="M108 162 H98"></path>
    <path d="M148 138 H156"></path><path d="M148 146 H158"></path><path d="M148 154 H156"></path><path d="M148 162 H158"></path>
  </g>

  <!-- "AI" label -->
  <text x="128" y="154" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="800" fill="#7dd3fc">AI</text>

  <!-- Circuit traces -->
  <g stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" opacity="0.55">
    <path d="M128 132 V124"></path>
    <path d="M118 132 L110 124"></path>
    <path d="M138 132 L146 124"></path>
  </g>
  <g fill="#7dd3fc" opacity="0.55">
    <circle cx="128" cy="122" r="5"></circle>
    <circle cx="110" cy="122" r="5"></circle>
    <circle cx="146" cy="122" r="5"></circle>
  </g>
</svg>